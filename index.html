<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#111113" />
    <title>DoseGuide.org — Harm Reduction Guide</title>
    <meta name="description" content="Evidence-based drug safety information. Dosage, interactions, and harm reduction data from peer-reviewed research." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100%; overflow: hidden; }
      body {
        height: 100%;
        overflow: hidden;
        background: #0a0a09;
        color: #c7c4be;
        font-family: 'Source Serif 4', Georgia, serif;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
      }
      #root { height: 100%; }

      /* Prevent iOS zoom on input focus — inputs must be >= 16px */
      input, select, textarea { font-size: 16px !important; }

      /* Smooth scrolling for scroll containers */
      .scroll-main {
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
      }

      /* Drawer overlay */
      .drawer-overlay {
        position: fixed; inset: 0; z-index: 90;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .drawer-overlay.open { opacity: 1; pointer-events: auto; }

      /* Drawer panel */
      .drawer-panel {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
        background: #1a1a1e;
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
        max-height: 85vh;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .drawer-panel.open { transform: translateY(0); }

      /* Page transitions */
      .page-enter { animation: pageIn 0.25s ease forwards; }
      @keyframes pageIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
