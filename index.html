    {
      "@context": "https://schema.org",
      "@type": "WebSite",

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "AboutPage",
      "name": "About DoseGuide",
      "url": "https://doseguide.org",
      "description": "DoseGuide is an open-source harm reduction resource. It does not encourage drug use. It exists because people use drugs whether or not they have good information, and the evidence is clear that informed users have better outcomes. All data is sourced from peer-reviewed research, government agencies, and established harm reduction organizations including the Global Drug Survey, The Lancet, DanceSafe, and SAMHSA. This project is personal. My father, Dr. Mark Depman, spent a good part of his career as an emergency physician in Vermont working at the intersection of substance use and harm reduction. In 2025, the Vermont Association for Mental Health and Addiction Recovery established the Dr. Mark Depman Trailblazer Award in his honor. DoseGuide is built in that spirit. — Charlie Depman",
      "author": {
        "@type": "Person",
        "name": "Charlie Depman"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalWebPage",
      "name": "DoseGuide.org — Evidence-Based Harm Reduction",
      "url": "https://doseguide.org",
      "about": {
        "@type": "MedicalCondition",
        "name": "Substance Use",
        "associatedAnatomy": { "@type": "AnatomicalStructure", "name": "Brain" }
      },
      "medicalAudience": {
        "@type": "MedicalAudience",
        "audienceType": "Patient"
      },
      "lastReviewed": "2026-03-31",
      "mainContentOfPage": {
        "@type": "WebPageElement",
        "description": "Safety margins, lethal dose ratios (Gable 2004), MCDA harm scores (Nutt 2010, Broman 2025), addiction capture rates (Lopez-Quintero 2011, Anthony 1994), drug interaction data (TripSit + peer-reviewed corrections), and supply purity data (DrugsData, Maryland RAD, DEA) for 25+ substances."
      },
      "citation": [
        "Nutt DJ, King LA, Phillips LD. Drug harms in the UK. Lancet. 2010;376:1558-1565.",
        "Lopez-Quintero C, et al. Probability of transition to dependence. Drug Alcohol Depend. 2011;115:120-130.",
        "Gable RS. Comparison of acute lethal toxicity. Addiction. 2004;99:686-696.",
        "Broman M, et al. US drug policy does not align with experts' rankings. Harm Reduction J. 2025;23:17."
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100%; overflow: hidden; }
      body {
        height: 100%;
        overflow: hidden;
        background: #0a0a09;
        color: #c7c4be;
        font-family: 'Source Serif 4', Georgia, serif;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
      }
      #root { height: 100%; }

      /* Prevent iOS zoom on input focus — inputs must be >= 16px */
      input, select, textarea { font-size: 16px !important; }

      /* Smooth scrolling for scroll containers */
      .scroll-main {
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
      }

      /* Drawer overlay */
      .drawer-overlay {
        position: fixed; inset: 0; z-index: 90;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .drawer-overlay.open { opacity: 1; pointer-events: auto; }

      /* Drawer panel */
      .drawer-panel {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
        background: #1a1a1e;
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
        max-height: 85vh;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .drawer-panel.open { transform: translateY(0); }

      /* Page transitions */
      .page-enter { animation: pageIn 0.25s ease forwards; }
      @keyframes pageIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideIn {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
